<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>名片 OCR 小工具</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
      :root {
        --bg: #f6f7f9;
        --panel: #ffffff;
        --text: #16181d;
        --muted: #6b7280;
        --line: #dde1e7;
        --strong-line: #c7ccd5;
        --accent: #111827;
        --accent-soft: #eef2ff;
        --ok: #0f766e;
        --warn: #b45309;
        --shadow: 0 8px 24px rgba(17, 24, 39, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        letter-spacing: 0;
      }

      a {
        color: inherit;
      }

      .shell {
        width: min(1180px, calc(100% - 32px));
        margin: 0 auto;
        padding: 28px 0 42px;
      }

      .topbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 16px;
        margin-bottom: 24px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .mark {
        display: grid;
        place-items: center;
        width: 42px;
        height: 42px;
        border-radius: 8px;
        background: var(--accent);
        color: white;
        font-weight: 800;
        line-height: 1;
      }

      h1 {
        margin: 0;
        font-size: clamp(28px, 4vw, 44px);
        line-height: 1.08;
      }

      .subtitle {
        margin: 8px 0 0;
        color: var(--muted);
        font-size: 15px;
      }

      .layout {
        display: grid;
        grid-template-columns: minmax(0, 1.05fr) minmax(340px, 0.95fr);
        gap: 18px;
        align-items: start;
      }

      .card {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        box-shadow: var(--shadow);
        overflow: hidden;
      }

      .card-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        padding: 18px 20px;
        border-bottom: 1px solid var(--line);
      }

      .card-header h2 {
        margin: 0;
        font-size: 18px;
      }

      .card-body {
        padding: 20px;
      }

      .field {
        display: grid;
        gap: 8px;
        margin-bottom: 16px;
      }

      label {
        color: #30343b;
        font-size: 14px;
        font-weight: 700;
      }

      .input,
      .select,
      .textarea {
        width: 100%;
        min-width: 0;
        border: 1px solid var(--strong-line);
        border-radius: 8px;
        background: #fff;
        color: var(--text);
        font: inherit;
        font-size: 15px;
        padding: 11px 12px;
        outline: none;
      }

      .textarea {
        min-height: 142px;
        resize: vertical;
        line-height: 1.55;
      }

      .textarea.raw {
        min-height: 280px;
      }

      .input:focus,
      .select:focus,
      .textarea:focus {
        border-color: #111827;
        box-shadow: 0 0 0 3px rgba(17, 24, 39, 0.1);
      }

      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px 12px;
      }

      .span-2 {
        grid-column: 1 / -1;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        min-height: 42px;
        border: 1px solid transparent;
        border-radius: 8px;
        padding: 10px 14px;
        background: var(--accent);
        color: #fff;
        font-weight: 800;
        font-size: 14px;
        text-decoration: none;
        cursor: pointer;
      }

      .btn.secondary {
        background: #fff;
        border-color: var(--strong-line);
        color: var(--text);
      }

      .btn:disabled {
        cursor: not-allowed;
        opacity: 0.58;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
      }

      .upload {
        display: grid;
        gap: 12px;
        border: 1px dashed var(--strong-line);
        border-radius: 8px;
        padding: 18px;
        background: #fafbfc;
      }

      .preview {
        display: none;
        width: 100%;
        max-height: 330px;
        object-fit: contain;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
      }

      .progress-wrap {
        display: none;
        height: 10px;
        border-radius: 999px;
        background: #e5e7eb;
        overflow: hidden;
      }

      .progress {
        width: 0%;
        height: 100%;
        background: var(--accent);
        transition: width 160ms ease;
      }

      .status {
        color: var(--muted);
        font-size: 14px;
        line-height: 1.5;
      }

      .status.ok {
        color: var(--ok);
        font-weight: 700;
      }

      .status.warn {
        color: var(--warn);
        font-weight: 700;
      }

      .notice {
        margin: 0 0 14px;
        padding: 12px;
        border-radius: 8px;
        background: var(--accent-soft);
        color: #334155;
        font-size: 14px;
        line-height: 1.5;
      }

      .json-output {
        min-height: 184px;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 13px;
      }

      .footer {
        margin-top: 18px;
        color: var(--muted);
        font-size: 13px;
      }

      @media (max-width: 860px) {
        .shell {
          width: min(100% - 28px, 640px);
          padding-top: 18px;
        }

        .topbar {
          align-items: flex-start;
          flex-direction: column;
        }

        .layout {
          grid-template-columns: 1fr;
        }

        .card-header {
          align-items: flex-start;
          flex-direction: column;
        }

        .grid {
          grid-template-columns: 1fr;
        }

        .btn {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div class="brand">
          <div class="mark">OCR</div>
          <div>
            <h1>名片 OCR 小工具</h1>
            <p class="subtitle">上傳名片，辨識文字後帶回新增客戶表單。</p>
          </div>
        </div>
        <a class="btn secondary" id="backTopLink" href="#">回新增客戶</a>
      </header>

      <div class="layout">
        <section class="card">
          <div class="card-header">
            <h2>辨識名片</h2>
            <select class="select" id="language" style="max-width:180px">
              <option value="chi_tra+eng">繁中 + 英文</option>
              <option value="eng">英文</option>
            </select>
          </div>
          <div class="card-body">
            <div class="notice">所有辨識都在瀏覽器執行。第一次使用會下載 OCR 模型，手機上可能需要等一下。</div>
            <div class="upload">
              <div class="field" style="margin-bottom:0">
                <label for="cardImage">上傳名片圖片</label>
                <input class="input" id="cardImage" type="file" accept="image/*" />
              </div>
              <img class="preview" id="preview" alt="名片預覽" />
              <div class="actions">
                <button class="btn" id="recognizeBtn" type="button">開始辨識</button>
                <button class="btn secondary" id="sampleBtn" type="button">載入文字範例</button>
              </div>
              <div class="progress-wrap" id="progressWrap"><div class="progress" id="progressBar"></div></div>
              <div class="status" id="statusText">請先選擇名片圖片，或貼上 OCR 原始文字。</div>
            </div>

            <div class="field" style="margin-top:18px">
              <label for="rawText">OCR 原始文字</label>
              <textarea class="textarea raw" id="rawText" placeholder="也可以把其他 OCR 工具辨識出的文字貼在這裡。"></textarea>
            </div>
            <div class="actions">
              <button class="btn secondary" id="extractBtn" type="button">整理欄位</button>
              <button class="btn secondary" id="clearBtn" type="button">清空</button>
            </div>
          </div>
        </section>

        <section class="card">
          <div class="card-header">
            <h2>整理結果</h2>
            <span class="status" id="fieldStatus">可人工修正後再帶回。</span>
          </div>
          <div class="card-body">
            <div class="grid">
              <div class="field span-2">
                <label for="companyName">公司名稱</label>
                <input class="input" id="companyName" />
              </div>
              <div class="field">
                <label for="contactName">負責人 / 聯絡人</label>
                <input class="input" id="contactName" />
              </div>
              <div class="field">
                <label for="contactRole">職稱</label>
                <input class="input" id="contactRole" />
              </div>
              <div class="field">
                <label for="companyPhone">公司電話</label>
                <input class="input" id="companyPhone" />
              </div>
              <div class="field">
                <label for="mobilePhone">手機</label>
                <input class="input" id="mobilePhone" />
              </div>
              <div class="field span-2">
                <label for="address">公司地址</label>
                <input class="input" id="address" />
              </div>
              <div class="field">
                <label for="taxId">統一編號</label>
                <input class="input" id="taxId" />
              </div>
              <div class="field">
                <label for="email">Email</label>
                <input class="input" id="email" />
              </div>
              <div class="field span-2">
                <label for="website">網站</label>
                <input class="input" id="website" />
              </div>
              <div class="field span-2">
                <label for="notes">備註</label>
                <textarea class="textarea" id="notes"></textarea>
              </div>
            </div>

            <div class="field">
              <label for="customerJson">客戶 JSON</label>
              <textarea class="textarea json-output" id="customerJson" readonly></textarea>
            </div>

            <div class="actions">
              <a class="btn" id="returnLink" href="#">帶回新增客戶</a>
              <button class="btn secondary" id="copyBtn" type="button">複製 JSON</button>
            </div>
            <p class="footer" id="returnHint">從原網站開啟時，這裡會帶你回新增客戶頁。</p>
          </div>
        </section>
      </div>
    </main>

    <script>
      const ids = {
        file: document.getElementById("cardImage"),
        preview: document.getElementById("preview"),
        language: document.getElementById("language"),
        recognize: document.getElementById("recognizeBtn"),
        sample: document.getElementById("sampleBtn"),
        extract: document.getElementById("extractBtn"),
        clear: document.getElementById("clearBtn"),
        raw: document.getElementById("rawText"),
        progressWrap: document.getElementById("progressWrap"),
        progress: document.getElementById("progressBar"),
        status: document.getElementById("statusText"),
        fieldStatus: document.getElementById("fieldStatus"),
        returnLink: document.getElementById("returnLink"),
        backTopLink: document.getElementById("backTopLink"),
        returnHint: document.getElementById("returnHint"),
        copy: document.getElementById("copyBtn"),
        json: document.getElementById("customerJson"),
      };

      const fields = {
        companyName: document.getElementById("companyName"),
        contactName: document.getElementById("contactName"),
        contactRole: document.getElementById("contactRole"),
        companyPhone: document.getElementById("companyPhone"),
        mobilePhone: document.getElementById("mobilePhone"),
        address: document.getElementById("address"),
        taxId: document.getElementById("taxId"),
        email: document.getElementById("email"),
        website: document.getElementById("website"),
        notes: document.getElementById("notes"),
      };

      const SAMPLE_TEXT = `日盛傢俱工程有限公司
負責人 王小明
TEL 02-2345-6789
手機 0912-345-678
台北市信義區松仁路100號8樓
統一編號 12345678
sales@example.com
www.example.com.tw`;

      function clean(value) {
        return String(value || "").replace(/\s+/g, " ").trim();
      }

      function getReturnUrl() {
        return new URLSearchParams(window.location.search).get("return_url") || "";
      }

      function fallbackCustomerUrl() {
        const path = window.location.pathname.replace(/\/ocr-tool\/?$/, "/");
        return `${window.location.origin}${path}#/customers/new`;
      }

      function splitLines(text) {
        return String(text || "")
          .replace(/\r/g, "\n")
          .split("\n")
          .map((line) => clean(line))
          .filter(Boolean);
      }

      function firstMatch(text, regex) {
        const match = String(text || "").match(regex);
        return match ? clean(match[1] || match[0]) : "";
      }

      function findPhone(lines, mobileOnly = false) {
        const mobileRe = /(?:\+?886[-\s]?)?09\d{2}[-\s]?\d{3}[-\s]?\d{3}|(?:\+?886[-\s]?)?9\d{2}[-\s]?\d{3}[-\s]?\d{3}/;
        const phoneRe = /(?:\+?886[-\s]?)?0\d{1,2}[-\s]?\d{3,4}[-\s]?\d{3,4}|\(\d{2,3}\)\s*\d{3,4}[-\s]?\d{3,4}/;
        for (const line of lines) {
          const match = line.match(mobileOnly ? mobileRe : phoneRe);
          if (match) return clean(match[0]);
        }
        return "";
      }

      function parseCardText(text) {
        const lines = splitLines(text);
        const joined = lines.join("\n");
        const email = firstMatch(joined, /[A-Z0-9._%+-]+@[A-Z0-9.-]+\.[A-Z]{2,}/i);
        const websiteLine =
          lines.find((line) => !/@/.test(line) && /(?:https?:\/\/|www\.)/i.test(line)) ||
          lines.find((line) => !/@/.test(line) && /[A-Z0-9-]+(?:\.[A-Z0-9-]+){1,}/i.test(line)) ||
          "";
        const website = firstMatch(websiteLine, /(?:https?:\/\/)?(?:www\.)?[A-Z0-9-]+(?:\.[A-Z0-9-]+)+(?:\/[^\s]*)?/i);
        const taxId = firstMatch(joined, /(?:統一編號|統編|Tax\s*ID|VAT)?\s*[:：]?\s*(\d{8})/i);
        const companyLine =
          lines.find((line) => /(有限公司|股份有限公司|企業社|工程行|設計|建材|家具|傢俱|水果|行號|公司)/.test(line) && !/@/.test(line)) ||
          lines[0] ||
          "";
        const addressLine =
          lines.find((line) => /(?:台|臺).{0,8}(?:市|縣).*(?:路|街|巷|弄|號|樓|室)/.test(line)) ||
          lines.find((line) => /(地址|Add|Address)/i.test(line)) ||
          "";
        const roleLine = lines.find((line) => /(負責人|聯絡人|業務|經理|總經理|董事長|店長|採購)/.test(line)) || "";
        const role = firstMatch(roleLine, /(負責人|聯絡人|業務|經理|總經理|董事長|店長|採購)/);
        let contactName = clean(roleLine.replace(role, "").replace(/[:：]/g, ""));
        if (!contactName || contactName.length > 8) {
          contactName = firstMatch(joined, /(?:負責人|聯絡人|業務|經理|總經理|董事長|店長|採購)\s*[:：]?\s*([\u4e00-\u9fff]{2,4})/);
        }
        const phone = findPhone(lines, false);
        const mobile = findPhone(lines, true);
        const notes = lines
          .filter((line) => line !== companyLine && line !== addressLine && line !== roleLine && line !== email && line !== website)
          .slice(0, 8)
          .join("\n");

        return {
          company_name: companyLine,
          contact_name: contactName,
          contact_role: role,
          phone,
          mobile,
          address: clean(addressLine.replace(/^(地址|Add|Address)\s*[:：]?/i, "")),
          tax_id: taxId,
          invoice_title: companyLine,
          email,
          website,
          notes,
        };
      }

      function payloadFromFields() {
        const company = clean(fields.companyName.value);
        return {
          customer_name: company,
          company_name: company,
          phone: clean(fields.companyPhone.value),
          address: clean(fields.address.value),
          tax_id: clean(fields.taxId.value),
          invoice_title: company,
          contact_name: clean(fields.contactName.value),
          contact_role: clean(fields.contactRole.value),
          contact_phone: clean(fields.mobilePhone.value) || clean(fields.companyPhone.value),
          contact_email: clean(fields.email.value),
          website: clean(fields.website.value),
          notes: clean(fields.notes.value),
          contacts: [
            {
              name: clean(fields.contactName.value),
              role: clean(fields.contactRole.value),
              phone: clean(fields.mobilePhone.value) || clean(fields.companyPhone.value),
              email: clean(fields.email.value),
              notes: "",
              primary: true,
            },
          ],
        };
      }

      function encodeCard(payload) {
        const bytes = new TextEncoder().encode(JSON.stringify(payload));
        let binary = "";
        bytes.forEach((byte) => (binary += String.fromCharCode(byte)));
        return btoa(binary).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/g, "");
      }

      function appendCardToUrl(returnUrl, payload) {
        const card = encodeCard(payload);
        if (returnUrl.includes("#")) {
          const [base, fragment] = returnUrl.split("#");
          const separator = fragment.includes("?") ? "&" : "?";
          return `${base}#${fragment}${separator}card=${encodeURIComponent(card)}`;
        }
        const separator = returnUrl.includes("?") ? "&" : "?";
        return `${returnUrl}${separator}card=${encodeURIComponent(card)}`;
      }

      function fillFields(data) {
        fields.companyName.value = data.company_name || "";
        fields.contactName.value = data.contact_name || "";
        fields.contactRole.value = data.contact_role || "";
        fields.companyPhone.value = data.phone || "";
        fields.mobilePhone.value = data.mobile || data.contact_phone || "";
        fields.address.value = data.address || "";
        fields.taxId.value = data.tax_id || "";
        fields.email.value = data.email || data.contact_email || "";
        fields.website.value = data.website || "";
        fields.notes.value = data.notes || "";
        refreshOutput();
      }

      function refreshOutput() {
        const payload = payloadFromFields();
        ids.json.value = JSON.stringify(payload, null, 2);
        const returnUrl = getReturnUrl() || fallbackCustomerUrl();
        const hasData = Boolean(payload.company_name || payload.contact_name || payload.phone || payload.address);
        ids.returnLink.href = appendCardToUrl(returnUrl, payload);
        ids.backTopLink.href = returnUrl;
        ids.returnLink.style.pointerEvents = hasData ? "auto" : "none";
        ids.returnLink.style.opacity = hasData ? "1" : "0.55";
        ids.returnHint.textContent = getReturnUrl() ? "會帶回原網站新增客戶頁，但仍需要你人工確認後按建立。" : "目前使用同網域的新增客戶頁作為帶回目的地。";
      }

      function setStatus(text, mode = "") {
        ids.status.textContent = text;
        ids.status.className = `status ${mode}`.trim();
      }

      ids.file.addEventListener("change", () => {
        const file = ids.file.files && ids.file.files[0];
        if (!file) return;
        ids.preview.src = URL.createObjectURL(file);
        ids.preview.style.display = "block";
        setStatus("圖片已選擇，可以開始辨識。", "ok");
      });

      ids.recognize.addEventListener("click", async () => {
        const file = ids.file.files && ids.file.files[0];
        if (!file) {
          setStatus("請先選擇名片圖片。", "warn");
          return;
        }
        if (!window.Tesseract) {
          setStatus("OCR 套件尚未載入，請重新整理頁面再試。", "warn");
          return;
        }
        ids.recognize.disabled = true;
        ids.progressWrap.style.display = "block";
        ids.progress.style.width = "0%";
        setStatus("正在載入 OCR 模型...", "");
        try {
          const result = await Tesseract.recognize(file, ids.language.value, {
            logger(message) {
              if (message.progress) ids.progress.style.width = `${Math.round(message.progress * 100)}%`;
              if (message.status) setStatus(`辨識中：${message.status}`);
            },
          });
          ids.raw.value = result.data.text || "";
          fillFields(parseCardText(ids.raw.value));
          setStatus("辨識完成，請檢查右側欄位。", "ok");
        } catch (error) {
          setStatus(`辨識失敗：${error.message || error}`, "warn");
        } finally {
          ids.recognize.disabled = false;
        }
      });

      ids.extract.addEventListener("click", () => {
        fillFields(parseCardText(ids.raw.value));
        ids.fieldStatus.textContent = "已重新整理欄位。";
      });

      ids.sample.addEventListener("click", () => {
        ids.raw.value = SAMPLE_TEXT;
        fillFields(parseCardText(SAMPLE_TEXT));
        setStatus("已載入範例文字。", "ok");
      });

      ids.clear.addEventListener("click", () => {
        ids.raw.value = "";
        ids.file.value = "";
        ids.preview.removeAttribute("src");
        ids.preview.style.display = "none";
        fillFields({});
        setStatus("已清空。");
      });

      ids.copy.addEventListener("click", async () => {
        refreshOutput();
        try {
          await navigator.clipboard.writeText(ids.json.value);
          ids.fieldStatus.textContent = "JSON 已複製。";
        } catch (error) {
          ids.json.select();
          ids.fieldStatus.textContent = "無法自動複製，請手動複製 JSON。";
        }
      });

      Object.values(fields).forEach((input) => input.addEventListener("input", refreshOutput));

      window.BusinessCardOCR = { parseCardText, payloadFromFields, appendCardToUrl };
      refreshOutput();
    </script>
  </body>
</html>
