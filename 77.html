<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>從深海到雪山：冬季滑雪之旅</title>
    <style>
        /* 基本背景與排版 */
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f0f4f8; /* 偏冷的雪地藍灰色 */
            color: #333;
            text-align: center;
        }

        /* 頂部大圖區塊 */
        .hero {
            /* 這裡放了一張高畫質的雪山風景圖 */
            background-image: url('https://images.unsplash.com/photo-1605540436563-5bca919ae766?ixlib=rb-4.0.3&auto=format&fit=crop&w=1200&q=80');
            background-size: cover;
            background-position: center;
            padding: 120px 20px;
            color: white;
            text-shadow: 1px 1px 5px rgba(0,0,0,0.8); /* 讓文字在雪地背景上更清楚 */
        }

        .hero h1 {
            font-size: 3em;
            margin: 0 0 10px 0;
        }

        /* 內容區塊 */
        .content {
            max-width: 800px;
            margin: -40px auto 40px auto; /* 往上移一點，蓋住部分圖片營造層次感 */
            padding: 40px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            position: relative; /* 配合 margin 負值使用 */
        }

        .content h2 {
            color: #2c3e50;
        }

        .content p {
            font-size: 1.1em;
            line-height: 1.8;
            color: #555;
            text-align: left;
        }

        /* ★ 連結按鈕的樣式設計 ★ */
        .back-link {
            display: inline-block;
            margin-top: 30px;
            padding: 15px 30px;
            background-color: #005f73; /* 使用與潛水網頁相呼應的深海藍 */
            color: white;
            text-decoration: none; /* 去掉連結預設的底線 */
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: bold;
            transition: background-color 0.3s, transform 0.2s;
        }

        .back-link:hover {
            background-color: #0a9396;
            transform: translateY(-2px); /* 滑鼠游標移過去時會微微往上浮 */
        }
    </style>
</head>
<body>

    <div class="hero">
        <h1>從深海到雪山</h1>
        <p>感受不一樣的極限與自由</p>
    </div>

    <div class="content">
        <h2>白雪皚皚的另一個世界</h2>
        <p>如果說潛水是享受無重力的寧靜，那滑雪就是體驗速度與激情的釋放。今年二月，我踏上了日本越後湯澤的雪地，在岩原滑雪場的純白世界裡盡情滑行，甚至還幸運地欣賞到了浪漫的冬日煙火。</p>
        <p>無論是在海底與海龜共游，還是在雪道上迎風馳騁，都是最珍貴的回憶。</p>

        <a href="https://asd-642.github.io/my-scuba-site/" class="back-link">
            &#11013; 回到我的潛水主頁
        </a>
    </div>

</body>
</html>
